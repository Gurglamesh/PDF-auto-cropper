<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #1e1e1e;
      color: #ddd;
      padding: 16px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    header img { width: 28px; height: 28px; }
    header h1  { font-size: 14px; font-weight: 600; }

    #status {
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 5px;
      margin-bottom: 12px;
      background: #2a2a2a;
      color: #aaa;
    }
    #status.ok    { background: #1a3a2a; color: #5dba7a; }
    #status.warn  { background: #3a2e1a; color: #d4a44a; }
    #status.error { background: #3a1a1a; color: #e06060; }

    #cropBtn {
      width: 100%;
      padding: 10px;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #cropBtn:hover:not(:disabled) { background: #357abd; }
    #cropBtn:disabled { background: #333; color: #666; cursor: default; }

    .spinner {
      display: inline-block;
      width: 11px; height: 11px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <img src="icons/icon.svg" alt="">
    <h1>Label Cropper</h1>
  </header>

  <div id="status">Checking page…</div>

  <button id="cropBtn" disabled>Crop &amp; Print</button>

  <script src="popup.js"></script>
</body>
</html>
